name: Build Zed Extension

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build precompiled extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 (2026-05-21)
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 (2026-05-21)
        with:
          node-version: 25.2.1

      - name: Build Zed extension package
        run: node zed-package

      - name: Prepare release metadata
        id: metadata
        shell: bash
        run: |
          VERSION="$(node -e "const fs=require('fs'); const m=fs.readFileSync('extension.toml','utf8').match(/^version = \"([^\"]+)\"/m); if (!m) process.exit(1); process.stdout.write(m[1]);")"
          TAG="zed-v${VERSION}-build.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          ARCHIVE="zed-socket-security-${VERSION}.tar.gz"
          MANIFEST="zed-socket-security-${VERSION}-manifest.json"
          cp build/zed/dist/archive.tar.gz "build/zed/dist/${ARCHIVE}"
          cp build/zed/dist/manifest.json "build/zed/dist/${MANIFEST}"
          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"
          echo "manifest=${MANIFEST}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify package contents
        shell: bash
        run: |
          test -f build/zed/dist/archive.tar.gz
          test -f build/zed/dist/manifest.json
          test -f "build/zed/dist/${{ steps.metadata.outputs.archive }}"
          test -f "build/zed/dist/${{ steps.metadata.outputs.manifest }}"
          test -f build/zed/package/extension.wasm
          tar -tzf build/zed/dist/archive.tar.gz | sort

      - name: Upload precompiled Zed extension
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0 (2026-05-22)
        with:
          name: zed-socket-security-precompiled-${{ github.sha }}
          path: |
            build/zed/dist/archive.tar.gz
            build/zed/dist/manifest.json
            build/zed/dist/${{ steps.metadata.outputs.archive }}
            build/zed/dist/${{ steps.metadata.outputs.manifest }}
            build/zed/package/extension.wasm
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.metadata.outputs.tag }}" \
            --target "$GITHUB_SHA" \
            --title "Zed Socket Security ${{ steps.metadata.outputs.version }} build ${{ github.run_number }}" \
            --notes "Precompiled Zed extension build for commit $GITHUB_SHA." \
            "build/zed/dist/${{ steps.metadata.outputs.archive }}#archive.tar.gz" \
            "build/zed/dist/${{ steps.metadata.outputs.manifest }}#manifest.json" \
            "build/zed/package/extension.wasm#extension.wasm"
