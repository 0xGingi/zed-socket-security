name: Build Zed Extension

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build precompiled extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 (2026-05-21)
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0 (2026-05-21)
        with:
          node-version: 25.2.1

      - name: Build Zed extension package
        run: node zed-package

      - name: Verify package contents
        shell: bash
        run: |
          test -f build/zed/dist/archive.tar.gz
          test -f build/zed/dist/manifest.json
          test -f build/zed/package/extension.wasm
          tar -tzf build/zed/dist/archive.tar.gz | sort

      - name: Upload precompiled Zed extension
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2 (2026-05-21)
        with:
          name: zed-socket-security-precompiled-${{ github.sha }}
          path: |
            build/zed/dist/archive.tar.gz
            build/zed/dist/manifest.json
            build/zed/package/extension.wasm
          if-no-files-found: error
          retention-days: 14
